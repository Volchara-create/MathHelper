services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mathhelper
      POSTGRES_PASSWORD: mh_secret_2026
      POSTGRES_DB: mathhelper
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "4011:3001"

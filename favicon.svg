<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3e7c"/>
      <stop offset="100%" stop-color="#0d2340"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- M letter stylized -->
  <text x="7" y="48" font-family="Georgia,serif" font-size="46" font-weight="bold" fill="url(#accent)">M</text>
  <!-- Small math dot accent -->
  <circle cx="54" cy="14" r="4" fill="#00d4ff" opacity="0.7"/>
  <circle cx="54" cy="25" r="2.5" fill="#00d4ff" opacity="0.4"/>
</svg>

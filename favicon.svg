<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#1a3e7c"/>
  <!-- Ruler diagonal \ -->
  <g transform="rotate(45 32 32)">
    <rect x="6" y="27" width="52" height="10" rx="2.5" fill="#ddeeff" stroke="#99bbdd" stroke-width="1"/>
    <line x1="18" y1="27" x2="18" y2="37" stroke="#88aacc" stroke-width="1.2"/>
    <line x1="27" y1="27" x2="27" y2="37" stroke="#88aacc" stroke-width="1.2"/>
    <line x1="36" y1="27" x2="36" y2="37" stroke="#88aacc" stroke-width="1.2"/>
    <line x1="45" y1="27" x2="45" y2="37" stroke="#88aacc" stroke-width="1.2"/>
  </g>
  <!-- Pencil diagonal / -->
  <g transform="rotate(-45 32 32)">
    <rect x="6" y="27" width="9" height="10" rx="2" fill="#ff8888"/>
    <rect x="15" y="27" width="29" height="10" fill="#FFD700"/>
    <polygon points="44,27 44,37 52,32" fill="#f0b800"/>
    <polygon points="49.5,29 49.5,35 54,32" fill="#333"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#1a3e7c"/>
  <!-- Ruler: shorter, rotated 45 -->
  <g transform="rotate(45 32 32)">
    <rect x="11" y="27" width="38" height="10" rx="2.5" fill="#e8f4ff" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="20" y1="27" x2="20" y2="33" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="28" y1="27" x2="28" y2="37" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="36" y1="27" x2="36" y2="33" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="44" y1="27" x2="44" y2="37" stroke="#60a5fa" stroke-width="1.5"/>
  </g>
  <!-- Pencil: longer, rotated -45 -->
  <g transform="rotate(-45 32 32)">
    <!-- Eraser -->
    <rect x="3" y="27" width="9" height="10" rx="2" fill="#f87171" stroke="#dc2626" stroke-width="1.2"/>
    <!-- Metal band -->
    <rect x="12" y="27" width="4" height="10" fill="#94a3b8"/>
    <!-- Body — longer -->
    <rect x="16" y="27" width="30" height="10" fill="#3b82f6" stroke="#2563eb" stroke-width="1.2"/>
    <!-- Tip wood -->
    <polygon points="46,27 46,37 56,32" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.2"/>
    <!-- Lead -->
    <polygon points="53,29 53,35 58,32" fill="#1e293b"/>
  </g>
</svg>
